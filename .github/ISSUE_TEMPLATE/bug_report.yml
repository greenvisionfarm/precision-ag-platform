name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "priority: medium"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

        > ⚠️ **Note:** This project is still in active development and has not been fully tested in production.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I click "Export ISOXML", nothing happens...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or log output.
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker
        - Local (Python + Node)
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Git commit hash or version tag
      placeholder: abc1234
    validations:
      required: false
