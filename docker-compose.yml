services:
  app:
    build: .
    container_name: field-mapper-app
    restart: always
    environment:
      - FIELD_MAPPER_ENV=production
      - FIELD_MAPPER_DB=/app/data/fields.db
      - REDIS_URL=redis://redis:6379/0
      - SESSION_SECRET=field-mapper-dev-secret-key-2026-do-not-use-in-prod
    volumes:
      - .:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    expose:
      - "8888"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M

  worker:
    build: .
    container_name: field-mapper-worker
    restart: always
    command: ["huey_consumer.py", "src.tasks.huey", "--workers=1", "--max-delay=60"]
    environment:
      - FIELD_MAPPER_ENV=production
      - FIELD_MAPPER_DB=/app/data/fields.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 512M

  redis:
    image: redis:alpine
    container_name: field-mapper-redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: field-mapper-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
