# pyproject.toml

[tool.ruff]
line-length = 88
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "venv",
    "node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = []
fixable = ["A", "B", "C", "D", "E", "F", "I", "W"]
unfixable = []

[tool.ruff.lint.isort]
known-first-party = ["app", "src"]
