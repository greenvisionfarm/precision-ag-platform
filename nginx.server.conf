client_max_body_size 1024M;

server {
    listen 80;
    server_name localhost;

    # Динамический резолвинг DNS через внутренний DNS докера (127.0.0.11)
    # Это предотвращает 502 ошибку при смене IP-адресов контейнеров
    resolver 127.0.0.11 valid=10s;

    location / {
        # Используем переменную для proxy_pass, чтобы Nginx не кешировал IP навсегда
        set $upstream_app app;
        proxy_pass http://$upstream_app:8888;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
