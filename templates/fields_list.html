{% extends "base.html" %}

{% block title %}Список Полей{% end %}

{% block content %}
    <h1>Список Полей</h1>

    <div id="upload-section">
        <h3>Загрузить новое поле</h3>
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="shapefile-input" name="shapefile_zip" accept=".zip" required>
            <button type="submit" id="upload-button" style="display: none;">Загрузить Shapefile (ZIP)</button>
        </form>
        <div id="upload-status" style="margin-top: 10px; color: green;"></div>
    </div>

    <div id="fields-table-container">
        <table id="fields-table" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название (кликните для правки)</th>
                    <th>Площадь</th>
                    <th>Владелец</th>
                    <th>Статус</th>
                    <th>Кадастр № (кликните)</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <!-- Данные будут загружены сюда -->
            </tbody>
        </table>
    </div>
{% end %}

{% block scripts %}
    <script>
        $(document).ready(function() {
            let owners = [];

            // 1. Сначала загружаем список владельцев
            $.getJSON('/api/owners', function(response) {
                owners = response.data;
                initializeTable();
            });

            function initializeTable() {
                const table = $('#fields-table').DataTable({
                    "ajax": "/api/fields_data",
                    "columns": [
                        { "data": "id" },
                        { 
                            "data": "name",
                            "render": function(data, type, row) {
                                return `<span class="editable-name" data-id="${row.id}">${data}</span>`;
                            }
                        },
                        { "data": "area" },
                        { 
                            "data": "owner_id",
                            "render": function(data, type, row) {
                                let select = `<select class="owner-select" data-id="${row.id}">`;
                                select += `<option value="">Не назначен</option>`;
                                owners.forEach(owner => {
                                    const selected = (owner.id == data) ? 'selected' : '';
                                    select += `<option value="${owner.id}" ${selected}>${owner.name}</option>`;
                                });
                                select += `</select>`;
                                return select;
                            }
                        },
                        {
                            "data": "land_status",
                            "render": function(data, type, row) {
                                const statuses = ["Собственность", "Аренда", "Субаренда"];
                                let select = `<select class="status-select" data-id="${row.id}">`;
                                select += `<option value="">Не указан</option>`;
                                statuses.forEach(s => {
                                    const selected = (s === data) ? 'selected' : '';
                                    select += `<option value="${s}" ${selected}>${s}</option>`;
                                });
                                select += `</select>`;
                                return select;
                            }
                        },
                        {
                            "data": "parcel_number",
                            "render": function(data, type, row) {
                                return `<span class="editable-parcel" data-id="${row.id}">${data || 'N/A'}</span>`;
                            }
                        },
                        {
                            "data": null,
                            "render": function(data, type, row) {
                                return `
                                    <button class="btn-save-details" data-id="${row.id}" style="display: none;">Сохранить</button>
                                    <button class="btn-delete">Удалить</button>
                                `;
                            },
                            "orderable": false
                        }
                    ],
                    "language": {
                        "url": "//cdn.datatables.net/plug-ins/1.11.5/i18n/ru.json"
                    }
                });

                // Обработчик изменения выбора владельца или статуса
                $('#fields-table tbody').on('change', '.owner-select, .status-select', function() {
                    $(this).closest('tr').find('.btn-save-details').show();
                });

                // Обработчик сохранения деталей
                $('#fields-table tbody').on('click', '.btn-save-details', function () {
                    const btn = $(this);
                    const fieldId = btn.data('id');
                    const row = btn.closest('tr');
                    
                    const ownerId = row.find('.owner-select').val();
                    const landStatus = row.find('.status-select').val();
                    const parcelNumber = row.find('.editable-parcel').text();

                    $.ajax({
                        url: `/api/field/assign_owner/${fieldId}`,
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ owner_id: ownerId }),
                        success: function() {
                            $.ajax({
                                url: `/api/field/update_details/${fieldId}`,
                                type: 'PUT',
                                contentType: 'application/json',
                                data: JSON.stringify({ 
                                    land_status: landStatus,
                                    parcel_number: parcelNumber
                                }),
                                success: function() {
                                    btn.hide();
                                    console.log("Детали сохранены.");
                                }
                            });
                        }
                    });
                });

                // Инлайн-редактирование кадастрового номера
                $('#fields-table tbody').on('click', '.editable-parcel', function() {
                    const span = $(this);
                    if (span.find('input').length > 0) return;

                    const current = span.text();
                    const input = $('<input type="text" class="edit-input">').val(current === 'N/A' ? '' : current);
                    span.html(input);
                    input.focus();

                    input.on('blur', function() {
                        const newVal = input.val().trim() || 'N/A';
                        span.text(newVal);
                        span.closest('tr').find('.btn-save-details').show();
                    });
                });

                // Инлайн-редактирование названия поля
                $('#fields-table tbody').on('click', '.editable-name', function() {
                    const span = $(this);
                    const fieldId = span.data('id');
                    const currentName = span.text();

                    if (span.find('input').length > 0) return;

                    const input = $('<input type="text" class="edit-input">').val(currentName);
                    span.html(input);
                    input.focus();

                    const saveChange = function() {
                        const newName = input.val().trim();
                        if (newName === "" || newName === currentName) {
                            span.text(currentName);
                            return;
                        }

                        $.ajax({
                            url: `/api/field/rename/${fieldId}`,
                            type: 'PUT',
                            contentType: 'application/json',
                            data: JSON.stringify({ new_name: newName }),
                            success: function() {
                                span.text(newName);
                                table.row(span.parents('tr')).data().name = newName;
                            }
                        });
                    };

                    input.on('blur', saveChange);
                    input.on('keypress', function(e) { if (e.which == 13) saveChange(); });
                });

                // Обработчик удаления
                $('#fields-table tbody').on('click', '.btn-delete', function () {
                    const data = table.row($(this).parents('tr')).data();
                    if (confirm(`Удалить поле "${data.name}"?`)) {
                        $.ajax({
                            url: `/api/field/delete/${data.id}`,
                            type: 'DELETE',
                            success: function() { table.ajax.reload(null, false); }
                        });
                    }
                });
            }
        });
    </script>
{% end %}
