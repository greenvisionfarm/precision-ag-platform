<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Карта Полей{% end %}</title>
    <!-- Leaflet CSS (общий для всех страниц, где нужна карта или базовые стили) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Leaflet.draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
          crossorigin=""/>
    <!-- DataTables CSS (общий для всех страниц, где нужна таблица) -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">

    <!-- Пользовательские стили -->
    <link rel="stylesheet" href="/static/css/style.css">

    {% block head_extra %}{% end %}
</head>
<body>

<button id="sidebar-toggle">☰</button>

<div id="sidebar">
    <hr> <!-- Разделитель -->
    <a href="/">Карта</a>
    <a href="/fields_list">Список полей</a>
    <a href="/owners">Владельцы</a>
    
    <div class="theme-switch-wrapper">
        <button id="theme-toggle-btn">
            <span class="icon">🌙</span>
            <span class="text">Темная тема</span>
        </button>
    </div>
</div>

<div class="main-content">
    {% block content %}{% end %}
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous"></script>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<!-- Leaflet.draw JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"
        crossorigin=""></script>
<!-- DataTables JS -->
<script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>

<!-- Наш общий скрипт для сайдбара и загрузки -->
<script src="/static/js/main.js"></script>

{% block scripts %}{% end %}

</body>
</html>
