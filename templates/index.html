{% extends "base.html" %}

{% block title %}Карта Полей{% end %}

{% block content %}
<div id="map"></div>
{% end %}

{% block scripts %}
<!-- Наш скрипт main.js уже подключен в base.html,
     но его логика должна быть адаптирована для работы с картой в блоке content.
     Пока оставляем так, если main.js не требует специфичных для index.html изменений,
     кроме инициализации карты. -->
<script>
    // Убедимся, что карта инициализируется после загрузки DOM
    $(document).ready(function() {
        // main.js уже содержит логику инициализации карты и загрузки полей
        // Если main.js будет содержать только общую логику,
        // то специфичная для карты инициализация должна быть здесь или в отдельном файле.
        // Для текущей структуры main.js, он сам инициализирует карту.
        // Если main.js будет разделен, то здесь будет вызов функции инициализации карты.
    });
</script>
{% end %}
