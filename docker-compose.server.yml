services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: field-mapper-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - SESSION_SECRET=field-mapper-server-secret-change-me-in-prod
      - FIELD_MAPPER_DB=/app/data/fields.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - field-mapper-net
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: field-mapper-worker
    restart: unless-stopped
    command: ["huey_consumer.py", "src.tasks.huey", "--workers=1", "--max-delay=60"]
    environment:
      - FIELD_MAPPER_DB=/app/data/fields.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - field-mapper-net
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: field-mapper-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - field-mapper-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  redis:
    image: redis:7-alpine
    container_name: field-mapper-redis
    restart: unless-stopped
    networks:
      - field-mapper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

networks:
  field-mapper-net:
    driver: bridge
