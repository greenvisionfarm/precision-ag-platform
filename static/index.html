<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Mapper</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" crossorigin=""/>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Кнопка мобильного меню -->
    <button id="sidebar-toggle">☰</button>

    <!-- Сайдбар -->
    <div id="sidebar">
        <h2>Field Mapper</h2>
        <nav>
            <a href="#map" class="nav-link active">🗺️ Карта</a>
            <a href="#fields" class="nav-link">📋 Список полей</a>
            <a href="#owners" class="nav-link">👥 Владельцы</a>
        </nav>

        <div id="upload-section-sidebar">
            <hr>
            <h3>Загрузка</h3>
            <form id="upload-form">
                <div class="form-group">
                    <input type="file" id="shapefile-input" name="shapefile_zip" accept=".zip" required>
                </div>
                <button type="submit" id="upload-button" style="display: none;">Загрузить ZIP</button>
                <div id="upload-status"></div>
            </form>
        </div>
        
        <div class="theme-switch-wrapper">
            <button id="theme-toggle-btn">
                <span class="icon">🌙</span>
                <span class="text">Темная тема</span>
            </button>
        </div>
    </div>

    <!-- Основной контент (Views) -->
    <div class="main-content">
        
        <!-- View: Карта -->
        <div id="view-map" class="view-section">
            <div id="map"></div>
        </div>

        <!-- View: Список полей -->
        <div id="view-fields" class="view-section" style="display: none;">
            <h1>Список Полей</h1>
            <div id="fields-table-container">
                <table id="fields-table" class="display" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Площадь</th>
                            <th>Владелец</th>
                            <th>Статус</th>
                            <th>Кадастр №</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- View: Владельцы -->
        <div id="view-owners" class="view-section" style="display: none;">
            <h1>Управление Владельцами</h1>
            <div id="add-owner-section">
                <h3>Добавить владельца</h3>
                <form id="add-owner-form">
                    <div class="form-group">
                        <label for="owner-name">ФИО / Название:</label>
                        <input type="text" id="owner-name" name="name" required placeholder="Введите имя">
                    </div>
                    <button type="submit" id="add-owner-btn">Добавить</button>
                </form>
            </div>
            <div id="owners-table-container">
                <table id="owners-table" class="display" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя / Название</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js" crossorigin=""></script>
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>

    <!-- Application Logic -->
    <script src="/static/js/main.js"></script>
    
    <script>
        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
